<header>
  <h1>dagward <span>· architecture map</span></h1>
  <div class="tabs" role="tablist" id="tabs"></div>
  <div class="searchbox">
    <input id="search" type="search" placeholder="Search nodes…" aria-label="Search nodes" autocomplete="off" />
    <span class="hits" id="hits"></span>
  </div>
</header>

<main>
  <div class="stage">
    <canvas id="cv"></canvas>
    <div class="controls">
      <div class="seg" role="group" aria-label="Layout mode">
        <button id="mode-layered" type="button" aria-pressed="true">Layered</button>
        <button id="mode-force" type="button" aria-pressed="false">Force</button>
      </div>
      <div class="seg" role="group" aria-label="Split by side" id="split-seg">
        <button id="split-on" type="button" aria-pressed="true">Split: sides</button>
        <button id="split-off" type="button" aria-pressed="false">off</button>
      </div>
      <div class="seg" role="group" aria-label="Color by">
        <button id="color-area" type="button" aria-pressed="false">Area</button>
        <button id="color-side" type="button" aria-pressed="true">Side</button>
      </div>
      <button id="fit" type="button">Fit view</button>
      <button id="clear" type="button">Clear selection</button>
      <button id="reset-folders" type="button" hidden>Reset folders</button>
    </div>
    <div class="hint">dependencies point down · top = no ingress, bottom = no egress · click a node to trace its dependencies · folders: double-click to expand (+N) or collapse</div>
    <div class="tooltip" id="tip"></div>
  </div>
  <aside>
    <div id="details-section" style="display:none">
      <h2>Selected node</h2>
      <div class="details" id="details"></div>
    </div>
    <h2>Level</h2>
    <div class="stats" id="stats"></div>
    <h2 id="legend-title">Areas</h2>
    <div class="legend" id="legend-areas"></div>
    <h2>Edges</h2>
    <div class="legend" id="legend-edges"></div>
    <h2>Cycles</h2>
    <div class="list" id="cycles"></div>
    <h2>Most depended on</h2>
    <div class="list" id="hubs"></div>
    <footer-note>
      Generated by <strong>dagward</strong> from
      <span class="rootpath" id="rootpath"></span>
    </footer-note>
  </aside>
</main>
